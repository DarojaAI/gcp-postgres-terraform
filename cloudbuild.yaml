# =============================================================================
# Cloud Build — rag-verifier service
# =============================================================================
# Triggered on push to main (via GitHub Push trigger in Cloud Build).
# Steps:
#   1. Build Docker image
#   2. Push to GCR
#   3. Deploy to Cloud Run
#
# Variables (substitute in Cloud Build trigger):
#   _REGION         = us-central1
#   _PROJECT_ID     = <GCP project ID>
#   _SERVICE_NAME   = rag-verifier
#   _REPO           = us-central1-docker.pkg.dev/<project>/rag-verifier
# =============================================================================

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_REPO:$COMMIT_SHA'
      - '-t'
      - '$_REPO:latest'
      - '.'
    id: 'build'

  # Push commit-tagged image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_REPO:$COMMIT_SHA'
    id: 'push-sha'
    waitFor: ['build']

  # Push latest image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_REPO:latest'
    id: 'push-latest'
    waitFor: ['push-sha']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=$_REPO:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--no-cpu-throttling'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=300'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--vpc-connector=$_VPC_CONNECTOR'
      - '--vpc-egress=all-traffic'
      - '--allow-unauthenticated'
    id: 'deploy'
    waitFor: ['push-latest']

images:
  - '$_REPO:$COMMIT_SHA'
  - '$_REPO:latest'

timeout: '1200s'
options:
  machineType: 'E2_HIGHCPU_8'
