name: Terraform Plan

on:
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
        default: prod

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'pull_request' && 'Validate' || format('Plan [{0}]', inputs.environment) }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # PR runs: validate HCL only, no GCP auth required.
      # Manual dispatch: full plan with GCP auth.
      - name: Authenticate to Google Cloud
        if: github.event_name == 'workflow_dispatch'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: true

      - name: Terraform Validate (PR)
        if: github.event_name == 'pull_request'
        working-directory: terraform
        run: |
          terraform init -backend=false
          terraform fmt -check -recursive
          terraform validate

      - name: Terraform Plan (manual)
        if: github.event_name == 'workflow_dispatch'
        id: plan
        env:
          TF_VAR_postgres_db_password: "${{ secrets.PROD_POSTGRES_PASSWORD }}"
        run: |
          cd terraform
          terraform init -backend-config="prefix=gcp-postgres-terraform/${{ inputs.environment }}"
          terraform validate
          terraform plan \
            -var-file="${{ inputs.environment }}.tfvars" \
            -no-color \
            -lock=false \
            || true

      - name: Post Plan Comment
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo,
              body: 'Terraform plan completed for `${{ inputs.environment }}`.'
            })
