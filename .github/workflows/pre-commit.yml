name: Pre-Commit Checks

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.6

      - name: Install dependencies
        run: pip install pyyaml

      - name: Make scripts executable
        run: chmod +x .github/scripts/*.py

      - name: Run filesystem checks
        run: |
          # Check for trailing whitespace in text files
          if grep -r ' $' --include='*.py' --include='*.tf' --include='*.yaml' --include='*.yml' --include='*.sh' --include='*.md' . 2>/dev/null | grep -v '.git/' | grep -v 'Binary'; then
            echo "ERROR: Trailing whitespace found"
            exit 1
          fi

      - name: Check for merge conflicts
        run: |
          if grep -r '<<<<<<<' --include='*.py' --include='*.tf' --include='*.yaml' --include='*.yml' --include='*.sh' --include='*.md' . 2>/dev/null | grep -v '.git/'; then
            echo "ERROR: Merge conflict markers found"
            exit 1
          fi

      - name: Check YAML syntax
        run: python3 .github/scripts/check_yaml.py

      - name: Check JSON syntax
        run: python3 .github/scripts/check_json.py

      - name: Check for large files
        run: python3 .github/scripts/check_large_files.py

      - name: Install and run yamllint
        run: |
          pip install yamllint
          yamllint -s .github/workflows/ || true

      - name: Check shell scripts with shellcheck
        run: |
          apt-get update && apt-get install -y shellcheck
          find . -name '*.sh' -not -path './.git/*' -exec shellcheck {} \; || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.6

      - name: Terraform Validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate