# Source of truth: the "version" field in package.json.
# semantic-release reads it directly; do not add a .release-please-manifest.json.
# The reusable workflow also maintains a VERSION file in the repo root.
#
name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  semantic-release:
    uses: DarojaAI/infra-actions/.github/workflows/reusable-semantic-release.yml@main
    with:
      skip-dirty-check: true
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
